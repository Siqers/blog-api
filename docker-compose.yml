version: '3.9'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - settings/.env
    depends_on:
      - redis
    volumes:
      - sqlite_data:/app/db.sqlite3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery_worker:
    build: .
    command: celery -A settings worker -l info
    env_file:
      - settings/.env
    depends_on:
      - redis

  celery_beat:
    build: .
    command: celery -A settings beat -l info
    env_file:
      - settings/.env
    depends_on:
      - redis

  flower:
    build: .
    command: celery -A settings flower --basic-auth=${BLOG_FLOWER_USER}:${BLOG_FLOWER_PASSWORD}
    ports:
      - "5555:5555"
    env_file:
      - settings/.env
    depends_on:
      - redis

volumes:
  sqlite_data:
