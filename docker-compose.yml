version: '3.9'

services:
  web:
    build: .
    expose:
      - "8000"
    env_file:
      - settings/.env
    environment:
      - DJANGO_SETTINGS_MODULE=settings.env.prod
    depends_on:
      - redis
    volumes:
      - sqlite_data:/app/db
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    depends_on:
      - web
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  celery_worker:
    build: .
    command: celery -A settings worker -l info
    env_file:
      - settings/.env
    depends_on:
      - redis
    restart: unless-stopped

  celery_beat:
    build: .
    command: celery -A settings beat -l info
    env_file:
      - settings/.env
    depends_on:
      - redis
    restart: unless-stopped

  flower:
    build: .
    command: celery -A settings flower --basic-auth=${BLOG_FLOWER_USER}:${BLOG_FLOWER_PASSWORD}
    ports:
      - "5555:5555"
    env_file:
      - settings/.env
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  sqlite_data:
  static_volume:
  media_volume: